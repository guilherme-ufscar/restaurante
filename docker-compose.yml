services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: delivery_admin
      POSTGRES_PASSWORD: delivery2025
      POSTGRES_DB: delivery_platform
    ports:
      - "30001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_admin -d delivery_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "30000:3000"
    environment:
      - DATABASE_URL=postgresql://delivery_admin:delivery2025@db:5432/delivery_platform?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c "npx prisma db push --skip-generate && node server.js"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
